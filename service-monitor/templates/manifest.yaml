apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.name }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.selector.app }}
  namespaceSelector:
      matchNames:
        - k8s-cost-insights
  endpoints:
    - port: {{ .Values.endpoint.port }}
      path: {{ .Values.endpoint.path }}
      interval: {{ .Values.endpoint.interval }}